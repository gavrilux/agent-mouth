# fly.toml app configuration file generated for agent-mouth on 2026-05-20T08:38:28+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'agent-mouth'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[env]
  # Para cambiar a Gemini: pon "gemini-2.5-flash" o "gemini-2.5-pro" aquí
  # y configura GOOGLE_API_KEY como secret. Cualquier modelo que empiece por
  # "gemini-" enruta al GeminiRuntime; el resto va a ClaudeRuntime.
  DEFAULT_AGENT_MODEL = "claude-sonnet-4-6"
  NOTES_UPDATER_MODEL = "claude-haiku-4-5-20251001"
  ENABLE_NOTES_UPDATER = "false"
  # Phase 3 — knowledge base + agent tools.
  # Rollout: keep ENABLE_AGENT_TOOLS=false on first deploy so the cron seeds
  # the index without the agent acting on it. Flip to "true" in step 2 of the
  # runbook (docs/runbooks/2026-05-25-phase-3-rollout.md).
  ENABLE_KNOWLEDGE_SYNC = "true"
  ENABLE_AGENT_TOOLS = "false"
  KNOWLEDGE_SYNC_INTERVAL_MIN = "15"

[mounts]
  source = "agent_mouth_knowledge"
  destination = "/data/knowledge"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  # Phase 3 bumped from 256→512mb. indexSource holds chunks + embedding batches
  # in memory and forks `git` for clone/fetch; 256mb OOMs on the first full sync
  # of CerebroDigital (~150 files).
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
