# fly.toml app configuration file generated for agent-mouth on 2026-05-20T08:38:28+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'agent-mouth'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[env]
  # Para cambiar a Gemini: pon "gemini-2.5-flash" o "gemini-2.5-pro" aquí
  # y configura GOOGLE_API_KEY como secret. Cualquier modelo que empiece por
  # "gemini-" enruta al GeminiRuntime; el resto va a ClaudeRuntime.
  DEFAULT_AGENT_MODEL = "claude-sonnet-4-6"
  NOTES_UPDATER_MODEL = "claude-haiku-4-5-20251001"
  ENABLE_NOTES_UPDATER = "false"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
